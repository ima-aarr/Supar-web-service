<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>super service</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #0f0;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(50px) contrast(300%) saturate(500%);
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #particle-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px #fff, 0 0 40px #f0f, 0 0 60px #0ff;
            backdrop-filter: blur(2px);
            mix-blend-mode: exclusion;
            will-change: transform;
            animation: chaos 0.1s infinite linear;
        }
        @keyframes chaos {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); filter: hue-rotate(0deg); }
            50% { transform: translate(10px, -10px) scale(2) rotate(180deg); filter: hue-rotate(180deg); }
            100% { transform: translate(-10px, 10px) scale(1) rotate(360deg); filter: hue-rotate(360deg); }
        }
        button {
            padding: 30px 60px;
            font-size: 32px;
            font-weight: bold;
            background-color: #f00;
            color: #fff;
            border: 10px solid #fff;
            cursor: pointer;
            box-shadow: 0 0 100px #f00;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: 0.1s;
        }
        button:hover {
            background-color: #a00;
            transform: scale(1.1) rotate(2deg);
        }
        #warning {
            color: #f00;
            font-size: 18px;
            margin-top: 30px;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 10px red;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1 style="color:red; font-size: 64px; text-shadow: 0 0 30px red;">⚠ SYSTEM END ⚠</h1>
        <button id="start-btn">自己破壊を実行</button>
        <p id="warning">
            【最終警告】<br>
            クリックすると端末の全リソースが飽和し、タブが即死します。<br>
            ブラウザのフリーズ、強制リブートが発生する可能性があります。<br>
            作業中のデータは失われます。自己責任で実行してください。
        </p>
    </div>

    <canvas id="glcanvas"></canvas>
    <div id="particle-container"></div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const uiLayer = document.getElementById('ui-layer');

        startBtn.addEventListener('click', () => {
            uiLayer.style.display = 'none';
            
            
            setTimeout(startCPUBurner, 10);
            setTimeout(startGPUBurner, 20);
            setTimeout(startDOMTrasher, 30);
            
            setTimeout(startInstantDeath, 100);
        });

        
        function startCPUBurner() {
            const workerCode = `
                function burnCPU() {
                    const buffer = new Float64Array(128 * 1024 * 1024); 
                    while(true) {
                        for(let i=0; i<1000000; i++) {
                            buffer[Math.floor(Math.random() * buffer.length)] = Math.random();
                        }
                    }
                }
                burnCPU();
            `;
            const blob = new Blob([workerCode], { type: 'application/javascript' });
            const workerUrl = URL.createObjectURL(blob);
            for (let i = 0; i < 128; i++) {
                try { new Worker(workerUrl); } catch(e) {}
            }
        }

       
        function startGPUBurner() {
            const canvas = document.getElementById('glcanvas');
            canvas.width = window.innerWidth * 2; 
            canvas.height = window.innerHeight * 2;
            const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');

            if (!gl) return;

            const vsSource = `
                attribute vec4 aVertexPosition;
                void main() { gl_Position = aVertexPosition; }
            `;

            const fsSource = `
                precision highp float;
                uniform float uTime;
                uniform vec2 uResolution;
                void main() {
                    vec2 uv = gl_FragCoord.xy / uResolution.xy;
                    vec2 z = uv * 2.0 - 1.0;
                    vec2 c = vec2(sin(uTime * 0.1), cos(uTime * 0.1)) * 1.5;
                    float iter = 0.0;
                    const int MAX_ITER = 15000; 
                    for(int i = 0; i < MAX_ITER; i++) {
                        float x = (z.x * z.x - z.y * z.y) + c.x * sin(z.y);
                        float y = (2.0 * z.x * z.y) + c.y * cos(z.x);
                        if((x * x + y * y) > 10.0) break;
                        z.x = x; z.y = y; iter++;
                    }
                    gl_FragColor = vec4(iter / float(MAX_ITER), 0.0, 0.0, 1.0);
                }
            `;

            function createShader(gl, type, source) {
                const shader = gl.createShader(type);
                gl.shaderSource(shader, source);
                gl.compileShader(shader);
                return shader;
            }

            const program = gl.createProgram();
            gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vsSource));
            gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fsSource));
            gl.linkProgram(program);
            gl.useProgram(program);

            const positionBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,1,-1,-1,1,1,1,-1]), gl.STATIC_DRAW);
            const posAttr = gl.getAttribLocation(program, 'aVertexPosition');
            gl.enableVertexAttribArray(posAttr);
            gl.vertexAttribPointer(posAttr, 2, gl.FLOAT, false, 0, 0);

            const timeLoc = gl.getUniformLocation(program, 'uTime');
            const resLoc = gl.getUniformLocation(program, 'uResolution');

            function render(time) {
                gl.uniform1f(timeLoc, time * 0.001);
                gl.uniform2f(resLoc, canvas.width, canvas.height);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                requestAnimationFrame(render);
            }
            requestAnimationFrame(render);
        }

     
        function startDOMTrasher() {
            const container = document.getElementById('particle-container');
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < 100000; i++) {
                const div = document.createElement('div');
                div.className = 'particle';
                div.style.left = Math.random() * 100 + 'vw';
                div.style.top = Math.random() * 100 + 'vh';
                div.style.animationDelay = `${Math.random() * -5}s`;
                div.style.animationDuration = `${0.05 + Math.random() * 0.2}s`;
                fragment.appendChild(div);
            }
            container.appendChild(fragment);
        }

        
        function startInstantDeath() {
            const blackhole = [];
            try {
                
                while (true) {
                    blackhole.push(new Float64Array(10000000));
                }
            } catch (e) {
                
                while (true) {
                    document.body.appendChild(document.createElement('div'));
                }
            }
        }
    </script>
</body>
</html>
